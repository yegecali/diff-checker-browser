<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>HTML Diff Checker</title>
</head>
<body>
  <div id="app">

    <header>
      <img src="../icons/icon48.png" width="18" height="18" alt="">
      <h1>HTML Diff Checker</h1>
    </header>

    <!-- Status banner -->
    <div id="status-bar" class="status idle">Ready — pick two elements to compare</div>

    <!-- Element 1 -->
    <section class="slot" id="slot1">
      <div class="slot-header">
        <span class="slot-label">Element 1</span>
        <span class="slot-badge" id="badge1">not selected</span>
      </div>
      <div class="slot-controls">
        <button class="pick-btn" id="pick1" title="Click to pick element on page">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 1a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 1z"/>
          </svg>
          Pick element
        </button>
        <span class="sep">or</span>
        <input type="text" id="selector1" placeholder="#id or .class or tag" autocomplete="off" spellcheck="false" />
        <button class="use-btn" id="use1">Use</button>
      </div>
    </section>

    <!-- Element 2 -->
    <section class="slot" id="slot2">
      <div class="slot-header">
        <span class="slot-label">Element 2</span>
        <span class="slot-badge" id="badge2">not selected</span>
      </div>
      <div class="slot-controls">
        <button class="pick-btn" id="pick2" title="Click to pick element on page">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 1a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 1z"/>
          </svg>
          Pick element
        </button>
        <span class="sep">or</span>
        <input type="text" id="selector2" placeholder="#id or .class or tag" autocomplete="off" spellcheck="false" />
        <button class="use-btn" id="use2">Use</button>
      </div>
    </section>

    <!-- Error -->
    <div id="error-box" class="hidden"></div>

    <!-- Diff result in popup -->
    <section id="diff-section" class="hidden">
      <div class="diff-header">
        <span>Diff Result</span>
        <span id="diff-stats"></span>
      </div>
      <div id="diff-output"></div>
    </section>

    <!-- Footer -->
    <footer>
      <button id="reset-btn" class="btn-secondary">Reset</button>
    </footer>

  </div>
  <script type="module" src="../dist/popup.js"></script>
</body>
</html>
